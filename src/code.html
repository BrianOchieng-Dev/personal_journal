<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MindVault - Focused Journaling</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .writing-area:focus {
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="flex h-screen overflow-hidden">
<!-- Sidebar -->
<aside class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col shrink-0">
<div class="p-6">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-3xl">menu_book</span>
<h1 class="text-xl font-bold tracking-tight">MindVault</h1>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Personal Journal</p>
</div>
<nav class="flex-1 px-4 space-y-1">
<button class="w-full flex items-center gap-3 px-3 py-2.5 bg-primary text-white rounded-lg font-medium transition-colors hover:bg-primary/90 mb-6">
<span class="material-symbols-outlined">add_box</span>
<span>New Entry</span>
</button>
<div class="space-y-1">
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-800 rounded-lg font-medium" href="#">
<span class="material-symbols-outlined">history</span>
<span>Journal Timeline</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg font-medium transition-colors" href="#">
<span class="material-symbols-outlined">star</span>
<span>Favorites</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg font-medium transition-colors" href="#">
<span class="material-symbols-outlined">lock</span>
<span>Private Entries</span>
</a>
</div>
</nav>
<div class="p-4 border-t border-slate-200 dark:border-slate-800">
<a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg font-medium transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span>Settings</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg font-medium transition-colors mt-1" href="#">
<span class="material-symbols-outlined text-red-500">logout</span>
<span>Logout</span>
</a>
</div>
</aside>
<!-- Main Area -->
<main class="flex-1 flex flex-col h-full bg-white dark:bg-background-dark overflow-y-auto">
<!-- Toolbar -->
<header class="sticky top-0 z-10 flex items-center justify-between px-8 py-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-1 text-slate-600 dark:text-slate-400">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Bold">
<span class="material-symbols-outlined text-[20px]">format_bold</span>
</button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Italic">
<span class="material-symbols-outlined text-[20px]">format_italic</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Heading 1">
<span class="material-symbols-outlined text-[20px]">format_h1</span>
</button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Heading 2">
<span class="material-symbols-outlined text-[20px]">format_h2</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="List">
<span class="material-symbols-outlined text-[20px]">format_list_bulleted</span>
</button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Quote">
<span class="material-symbols-outlined text-[20px]">format_quote</span>
</button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Code">
<span class="material-symbols-outlined text-[20px]">code</span>
</button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Highlight">
<span class="material-symbols-outlined text-[20px]">ink_highlighter</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="flex items-center gap-2 px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" title="Set Date">
<span class="material-symbols-outlined text-[20px]">calendar_today</span>
<span class="text-xs font-medium">May 24, 2024</span>
</button>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 text-sm">
<span class="material-symbols-outlined text-green-500 text-[18px]">cloud_done</span>
<span>Saved</span>
</div>
<button class="px-5 py-2 bg-primary/10 text-primary dark:bg-primary/20 dark:text-primary rounded-lg font-semibold text-sm hover:bg-primary hover:text-white transition-all">
                        Publish
                    </button>
</div>
</header>
<!-- Editor Section -->
<div class="max-w-3xl mx-auto w-full px-8 pt-16 pb-32">
<input class="w-full bg-transparent border-none text-4xl font-bold placeholder:text-slate-300 dark:placeholder:text-slate-700 focus:ring-0 mb-8" placeholder="Title your entry..." type="text"/>
<div class="flex items-center gap-3 mb-10 text-slate-400 border-b border-slate-100 dark:border-slate-800 pb-4">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 shrink-0 overflow-hidden">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="User profile circular avatar placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNQw1jNLBRAQEoVdI6nxYkMasWHM9tbNa9nAOy9jdQ-ZFm1B5AAEsywUG4sQZvsCjEnjjfuqccZ13ig8KCvkESIwCn-WfiBdPfIWWr-JJYsVV07T7GCkfykYzg0J56VtM0BvDzRzNOiqJnXpLrT_7WvJB1QtPVO4iNN4iL_MjK0tp-UYo3y6DybnKHqEvbws9os0gxQZxiMsYO76WNPCqSh5-uBVs0LmumdMGkEGYIadSgnRUV3V9Sa-M9x3inl_CBewHJAEhP2z_o"/>
</div>
<div>
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Alex Thompson</p>
<p class="text-xs">Drafting in Personal Thoughts</p>
</div>
</div>
<textarea class="writing-area w-full min-h-[500px] bg-transparent border-none text-lg leading-relaxed placeholder:text-slate-300 dark:placeholder:text-slate-700 focus:ring-0 p-0 resize-none" placeholder="Start writing your thoughts... let the mind vault open."></textarea>
</div>
<!-- Footer Stats -->
<footer class="fixed bottom-0 right-0 left-64 bg-white/95 dark:bg-background-dark/95 border-t border-slate-200 dark:border-slate-800 px-8 py-3 flex items-center justify-between backdrop-blur-sm">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-widest">
<span class="material-symbols-outlined text-[16px]">article</span>
<span>254 Words</span>
</div>
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-widest">
<span class="material-symbols-outlined text-[16px]">schedule</span>
<span>Last saved 2m ago</span>
</div>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">share</span>
<span class="text-xs font-bold uppercase tracking-widest">Share</span>
</button>
<div class="w-px h-4 bg-slate-200 dark:bg-slate-800"></div>
<button class="flex items-center gap-2 text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
<span class="text-xs font-bold uppercase tracking-widest">Delete</span>
</button>
</div>
</footer>
</main>
</div>
</body></html>
